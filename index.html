<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cún và Bé Hổ</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
    text-align: center;
}

/* hiệu ứng xuất hiện */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

h1 {
    color: #ff4d6d;
    font-size: 42px;
    margin-top: 20px;
    margin-bottom: 10px;
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.love-text {
    font-size: 20px;
    color: #666;
    margin-bottom: 30px;
}

.section-title {
    color: #ff4d6d;
    margin: 40px 0 20px;
    font-size: 32px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.item {
    background: white;
    padding: 10px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.item img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    border-radius: 15px;
    display: block;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.item img:hover {
    transform: scale(1.02);
}

.video-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-top: 20px;
}

.video-item {
    background: white;
    padding: 10px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.video-item iframe {
    width: 100%;
    height: 260px;
    border-radius: 15px;
    border: none;
    display: block;
}

/* khung phóng to ảnh */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
    z-index: 9999;
}

.lightbox img {
    max-width: min(92vw, 900px);
    max-height: 88vh;
    width: auto;
    height: auto;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 36px;
    color: white;
    cursor: pointer;
    line-height: 1;
    user-select: none;
}

@media (max-width: 600px) {
    .gallery,
    .video-grid {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 34px;
    }

    .section-title {
        font-size: 26px;
    }

    .item img {
        height: 340px;
    }

    .video-item iframe {
        height: 220px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>🐶 Cún và Bé Hổ ❤️</h1>
    <p class="love-text">Anh luôn luôn ở bên cạnh yêu thương em</p>

    <h2 class="section-title">Những kỷ niệm của tụi mình</h2>

    <div class="gallery">
        <div class="item fade">
            <img src="https://drive.google.com/thumbnail?id=1QQr_Q-i4fzXH_zNzVJUgsENXbMi8CaaO&sz=w1200" onclick="openImage(this.src)">
        </div>

        <div class="item fade">
            <img src="https://drive.google.com/thumbnail?id=18VaDnF36hI3gBdIFnjGBEmR748FIvyVI&sz=w1200" onclick="openImage(this.src)">
        </div>

        <div class="item fade">
            <img src="https://drive.google.com/thumbnail?id=1oxJf8tM_gK6Tr0mEStu34_DkDdpFmXAY&sz=w1200" onclick="openImage(this.src)">
        </div>

        <div class="item fade">
            <img src="https://drive.google.com/thumbnail?id=1RDPjrs1n8QDDWEa06kQqlVkrF1E-CpRw&sz=w1200" onclick="openImage(this.src)">
        </div>

        <div class="item fade">
            <img src="https://drive.google.com/thumbnail?id=1N_IXact5T4CzYImroJnvBXxq-3U__k1z&sz=w1200" onclick="openImage(this.src)">
        </div>

        <div class="item fade">
            <img src="https://drive.google.com/thumbnail?id=19YoalCICexHzCFE1lu4ApyhHCwgBCM_g&sz=w1200" onclick="openImage(this.src)">
        </div>
    </div>

    <h2 class="section-title">Những video của tụi mình</h2>

    <div class="video-grid">
        <div class="video-item fade">
            <iframe src="https://drive.google.com/file/d/1tm5m6hMulteZQO2ZAfWo38B1yTB67slG/preview" allow="autoplay"></iframe>
        </div>

        <div class="video-item fade">
            <iframe src="https://drive.google.com/file/d/1IKVcePi0faqs7GESKXDfupbMXkfllRcH/preview" allow="autoplay"></iframe>
        </div>

        <div class="video-item fade">
            <iframe src="https://drive.google.com/file/d/1DK0_StHx6t8TPYr2VpcZ9P_bxXw7-QOP/preview" allow="autoplay"></iframe>
        </div>

        <div class="video-item fade">
            <iframe src="https://drive.google.com/file/d/1zySOZsoP7AnhXPf0teeGFVE9ArKHXZhl/preview" allow="autoplay"></iframe>
        </div>
    </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeImage(event)">
    <div class="lightbox-close" onclick="closeImage(event)">&times;</div>
    <img id="lightboxImg" src="" alt="Ảnh phóng to">
</div>

<script>
const items = document.querySelectorAll('.fade');

function showOnScroll() {
    const triggerBottom = window.innerHeight * 0.9;

    items.forEach(item => {
        const top = item.getBoundingClientRect().top;
        if (top < triggerBottom) {
            item.classList.add('show');
        }
    });
}

window.addEventListener('scroll', showOnScroll);
showOnScroll();

function openImage(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeImage(event) {
    if (
        event.target.id === 'lightbox' ||
        event.target.classList.contains('lightbox-close')
    ) {
        document.getElementById('lightbox').style.display = 'none';
        document.getElementById('lightboxImg').src = '';
        document.body.style.overflow = 'auto';
    }
}
</script>

</body>
</html>
